services:
  onefile:
    image: ${ONEFILE_IMAGE:-ghcr.io/zhihui-hu/onefile:latest}
    pull_policy: ${ONEFILE_PULL_POLICY:-always}
    restart: unless-stopped
    init: true
    environment:
      APP_SECRET: ${APP_SECRET:-}
      APP_ORIGIN: ${APP_ORIGIN:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?GITHUB_CLIENT_ID is required}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET is required}
    ports:
      - '${ONEFILE_HOST:-127.0.0.1}:${ONEFILE_PORT:-27507}:27507'
    volumes:
      - onefile-data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || 27507) + ''/'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  onefile-data:
