upstream onefile_backend {
  server 127.0.0.1:27507;
  keepalive 32;
}

server {
  listen 80;
  server_name onefile.huzhihui.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name onefile.huzhihui.com;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  client_max_body_size 100M;

  ssl_certificate /etc/nginx/ssl/huzhihui.com.pem;
  ssl_certificate_key /etc/nginx/ssl/huzhihui.com.key;


  location / {
    proxy_pass http://onefile_backend; # 注意是 https
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket (noVNC) 必备
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 自签名后端：关闭校验并启用 SNI
    proxy_ssl_server_name on;
    proxy_ssl_verify off;

    # 长连接/低延迟
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
  }


  access_log /var/log/nginx/onefile.access.log;
  error_log /var/log/nginx/onefile.error.log warn;
}