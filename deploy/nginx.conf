# 只在客户端发起 Upgrade 时透传升级连接；普通请求保持空值，方便 upstream keepalive 复用。
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' '';
}

# OneFile API 实际使用 GET/HEAD/POST/PATCH/DELETE；其余方法先挡在 Nginx 边缘。
map $request_method $onefile_invalid_method {
  default 1;
  GET 0;
  HEAD 0;
  POST 0;
  PATCH 0;
  DELETE 0;
}

# 拦截常见扫描器、路径穿越和低成本 SQL/XSS 探测；只检查 URL path，避免误伤文件搜索和对象 key 查询。
map $uri $onefile_blocked_path {
  default 0;
  ~*(?:\.\./|%2e%2e|%252e%252e|<script|%3cscript|/etc/passwd|%00) 1;
  ~*(?:union(?:%20|\+|/\*.*\*/)+select|select(?:%20|\+)+.*(?:from|sleep|benchmark)\() 1;
}

# 按客户端 IP 建立限流/连接数共享区，减少扫描器和异常高频请求挤占后端。
limit_req_zone $binary_remote_addr zone=onefile_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=onefile_upload:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=onefile_conn:10m;

# Next.js standalone 容器监听在本机 27507，由 Nginx 负责 TLS、限流和安全头。
upstream onefile_backend {
  server 127.0.0.1:27507 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

# 明确跳到规范 HTTPS 域名，避免把任意 Host 原样带入跳转。
server {
  listen 80;
  server_name onefile.huzhihui.com;
  server_tokens off;
  return 301 https://onefile.huzhihui.com$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name onefile.huzhihui.com;
  server_tokens off;

  # 只启用现代 TLS；TLSv1.3 会忽略 ssl_ciphers，TLSv1.2 使用下面的 AEAD 套件。
  ssl_certificate /etc/nginx/ssl/huzhihui.com.pem;
  ssl_certificate_key /etc/nginx/ssl/huzhihui.com.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:onefile_ssl:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # 应用直传上限是 100 MiB，这里留出 multipart/form-data 边界和头部开销。
  client_max_body_size 128M;
  client_body_timeout 60s;
  client_header_timeout 15s;
  keepalive_timeout 65s;
  send_timeout 60s;
  autoindex off;

  # 限流/连接数命中时返回 429，便于前端和日志区分为频率限制。
  limit_req_status 429;
  limit_conn_status 429;
  limit_conn onefile_conn 50;
  proxy_hide_header X-Powered-By;

  # 常用安全响应头；更严格的 CSP 需要结合前端资源加载策略单独评估。
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # 这里只做 return，不做 rewrite/proxy，属于 Nginx 中相对安全的 if 用法。
  if ($onefile_invalid_method) {
    return 405;
  }

  if ($onefile_blocked_path) {
    return 403;
  }

  # 常见后台、CMS、数据库管理器扫描路径，本应用不会使用，直接隐藏为 404。
  location ~* ^/(?:admin|phpmyadmin|pma|mysql|wp-admin|wp-login\.php|wordpress|cgi-bin)(?:/|$) {
    return 404;
  }

  # 禁止访问隐藏目录和环境文件，避免误暴露仓库、配置或密钥。
  location ~* (?:^|/)\.(?:git|svn|hg|env)(?:[./]|$) {
    return 404;
  }

  # 禁止直访常见备份、日志、本地数据库和临时文件；SQL 备份由 /api/admin/sql-backup 受权限控制导入导出。
  location ~* \.(?:bak|conf|config|dist|ini|log|old|orig|sqlite|swp|tmp)$ {
    return 404;
  }

  # Next.js hash 静态资源可高并发访问；缓存头由 Next 后端产出，Nginx 不覆盖。
  location ^~ /_next/static/ {
    limit_req zone=onefile_general burst=200 nodelay;
    proxy_pass http://onefile_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
  }

  # 上传接口耗时更长、请求体更大：单独放宽 burst，并关闭请求/响应缓冲以保留进度与流式行为。
  location ~* ^/api/(?:uploads(?:/|$)|public-uploads/) {
    limit_req zone=onefile_upload burst=120 nodelay;
    proxy_pass http://onefile_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # 默认反代所有页面和 API；App Router streaming 需要关闭 proxy_buffering。
  location / {
    limit_req zone=onefile_general burst=80 nodelay;
    proxy_pass http://onefile_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;
  }

  access_log /var/log/nginx/onefile.access.log;
  error_log /var/log/nginx/onefile.error.log warn;
}
